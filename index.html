<!DOCTYPE html>
<html>
<head>
<title>Flappy Pro Game</title>
<style>
body {
    margin:0;
    overflow:hidden;
    background: linear-gradient(#70c5ce, #ffffff);
    font-family:Arial;
}
#game {
    position:relative;
    width:100%;
    height:100vh;
}
#player {
    position:absolute;
    top:200px;
    left:60px;
    font-size:45px;
    transition: transform 0.1s;
}
.pipe {
    position:absolute;
    width:70px;
    background:linear-gradient(green, darkgreen);
    border-radius:10px;
}
#score, #highScore {
    position:absolute;
    left:10px;
    font-size:20px;
    color:black;
}
#score { top:10px; }
#highScore { top:35px; }

#startBtn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 30px;
    font-size:20px;
}

#gameOverBox {
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div id="game">
    <div id="player">🐦</div>
    <div id="score">Score: 0</div>
    <div id="highScore">High: 0</div>

    <button id="startBtn">Start Game</button>

    <div id="gameOverBox">
        <h2>💀 Game Over</h2>
        <p id="finalScore"></p>
        <button onclick="restart()">Restart</button>
    </div>
</div>

<script>function playSound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();
}
let player = document.getElementById("player");
let scoreText = document.getElementById("score");
let highScoreText = document.getElementById("highScore");
let startBtn = document.getElementById("startBtn");
let gameOverBox = document.getElementById("gameOverBox");
let finalScore = document.getElementById("finalScore");

let y = 200;
let velocity = 0;
let gravity = 1.5;
let score = 0;
let gameRunning = false;

let highScore = localStorage.getItem("highScore") || 0;
highScoreText.innerText = "High: " + highScore;

function jump(){
    if(gameRunning){
        velocity = -12;
        player.style.transform = "rotate(-20deg)";
        setTimeout(()=>player.style.transform="rotate(20deg)",100);
    }
}
document.body.onclick = jump;

startBtn.onclick = () => {
    gameRunning = true;
    startBtn.style.display = "none";
};

function createPipe(){
    if(!gameRunning) return;

    let pipeTop = document.createElement("div");
    let pipeBottom = document.createElement("div");

    let gap = 170;
    let height = Math.random()*300;

    pipeTop.className = "pipe";
    pipeBottom.className = "pipe";

    pipeTop.style.height = height+"px";
    pipeTop.style.top = "0";

    pipeBottom.style.height = (window.innerHeight-height-gap)+"px";
    pipeBottom.style.bottom = "0";

    document.getElementById("game").appendChild(pipeTop);
    document.getElementById("game").appendChild(pipeBottom);

    let x = window.innerWidth;

    let move = setInterval(()=>{
        x -= 4;
        pipeTop.style.left = x+"px";
        pipeBottom.style.left = x+"px";

        if(x < -70){
            pipeTop.remove();
            pipeBottom.remove();
            clearInterval(move);
            score++;
            scoreText.innerText = "Score: " + score;
        }

        if(x < 110 && x > 50){
            if(y < height || y > height+gap){
                gameOver();
            }
        }

    },20);
}

setInterval(createPipe,2000);

function gameLoop(){
    if(!gameRunning) return requestAnimationFrame(gameLoop);

    velocity += gravity;
    y += velocity;

    if(y < 0) y = 0;
    if(y > window.innerHeight-50){
        gameOver();
    }

    player.style.top = y+"px";

    requestAnimationFrame(gameLoop);
}

function gameOver(){
    gameRunning = false;
    finalScore.innerText = "Score: " + score;
    gameOverBox.style.display = "block";

    if(score > highScore){
        localStorage.setItem("highScore", score);
    }
}

function restart(){
    location.reload();
}

gameLoop();
</script>

</body>
</html>
