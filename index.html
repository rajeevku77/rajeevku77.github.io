<!DOCTYPE html>
<html>
<head>
<title>Mini Game</title>
<style>
body {
    margin:0;
    overflow:hidden;
    background:#70c5ce;
}
#game {
    position:relative;
    width:100%;
    height:100vh;
}
#player {
    width:40px;
    height:40px;
    background:red;
    position:absolute;
    top:50%;
    left:50px;
}
.obstacle {
    width:50px;
    background:green;
    position:absolute;
    right:0;
}
</style>
</head>

<body onclick="jump()">

<div id="game">
    <div id="player"></div>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");

let y = 200;
let gravity = 2;
let velocity = 0;
let score = 0;

function jump(){
    velocity = -15;
}

function createObstacle(){
    let obstacleTop = document.createElement("div");
    let obstacleBottom = document.createElement("div");

    let gap = 150;
    let height = Math.random()*300;

    obstacleTop.classList.add("obstacle");
    obstacleBottom.classList.add("obstacle");

    obstacleTop.style.height = height + "px";
    obstacleTop.style.top = "0px";

    obstacleBottom.style.height = (window.innerHeight - height - gap) + "px";
    obstacleBottom.style.bottom = "0px";

    game.appendChild(obstacleTop);
    game.appendChild(obstacleBottom);

    let x = window.innerWidth;

    let move = setInterval(()=>{
        x -= 5;
        obstacleTop.style.right = (window.innerWidth - x) + "px";
        obstacleBottom.style.right = (window.innerWidth - x) + "px";

        if(x < -50){
            obstacleTop.remove();
            obstacleBottom.remove();
            clearInterval(move);
            score++;
            console.log("Score:", score);
        }

        // collision
        if(
            x < 90 && x > 40 &&
            (y < height || y > height + gap)
        ){
            alert("Game Over! Score: " + score);
            location.reload();
        }

    },30);
}

setInterval(createObstacle,2000);

function gameLoop(){
    velocity += gravity;
    y += velocity;

    if(y < 0) y = 0;
    if(y > window.innerHeight-40){
        alert("Game Over! Score: " + score);
        location.reload();
    }

    player.style.top = y + "px";

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
