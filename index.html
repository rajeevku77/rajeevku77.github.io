<!DOCTYPE html>
<html>
<head>
    <title>India Job Update</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }
        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }
        .card {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
        }
        .green { background: green; }
        .blue { background: blue; }
        .red { background: red; }
    </style>
</head>

<body>

<header>India Job Update</header>

<div class="card">
    <h3>SSC GD Constable 2026</h3><a href="https://ssc.nic.in">Apply</a>
    <button class="green">Apply</button>
</div>

<div class="card">
    <h3>Railway Group D Vacancy</h3>
    <button class="green">Apply Now</button>
</div>

<div class="card">
    <h3>SSC MTS Admit Card</h3>
    <button class="blue">Download</button>
</div>

<div class="card">
    <h3>10th Result 2026</h3>
    <button class="red">Check Result</button>
</div>

</body>
</html>
