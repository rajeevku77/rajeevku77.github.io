<!DOCTYPE html>
<html>
<head>
    <title>Click Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
        }
        h1 {
            background: blue;
            color: white;
            padding: 10px;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            background: green;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🎮 Click Game</h1>

<h2>Score: <span id="score">0</span></h2>

<button onclick="increaseScore()">Click Me</button>

<script>
    let score = 0;

    function increaseScore() {
        score++;
        document.getElementById("score").innerText = score;
    }
</script>

</body>
</html>
