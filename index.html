<!DOCTYPE html>
<html>
<head>
<title>Car Game</title>
<style>
body { margin:0; background:green; overflow:hidden; }

#road {
    width:300px;
    height:100vh;
    background:#333;
    margin:auto;
    position:relative;
    overflow:hidden;
}

#player {
    position:absolute;
    bottom:20px;
    left:120px;
    font-size:40px;
}

.enemy {
    position:absolute;
    top:0;
    font-size:40px;
}

#score {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
}

.controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
}

button {
    width:80px;
    height:50px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="road">
    <div id="player">🚗</div>
    <div id="score">Score: 0</div>
</div>

<div class="controls">
    <button onclick="moveLeft()">⬅️</button>
    <button onclick="moveRight()">➡️</button>
</div>

<script>
let player = document.getElementById("player");
let road = document.getElementById("road");
let score = 0;
let speed = 5;

function moveLeft(){
    let left = player.offsetLeft - 30;
    if(left > 0){
        player.style.left = left + "px";
    }
}

function moveRight(){
    let right = player.offsetLeft + 30;
    if(right < 260){
        player.style.left = right + "px";
    }
}

function createEnemy(){
    let enemy = document.createElement("div");
    enemy.innerText = "🚙";
    enemy.className = "enemy";
    enemy.style.left = Math.random()*250 + "px";
    road.appendChild(enemy);

    let move = setInterval(()=>{
        enemy.style.top = enemy.offsetTop + speed + "px";

        if(enemy.offsetTop > window.innerHeight){
            enemy.remove();
            clearInterval(move);
            score++;
            document.getElementById("score").innerText = "Score: " + score;
        }

        if(
            enemy.offsetTop > player.offsetTop - 40 &&
            enemy.offsetLeft < player.offsetLeft + 40 &&
            enemy.offsetLeft + 40 > player.offsetLeft
        ){
            alert("💥 Game Over! Score: " + score);
            location.reload();
        }

    },30);
}

setInterval(createEnemy,1500);
</script>

</body>
</html>
