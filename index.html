<!DOCTYPE html>
<html>
<head>
<title>Flappy Game</title>
<style>
body {
    margin:0;
    overflow:hidden;
    background:#70c5ce;
    font-family:Arial;
}
#game {
    position:relative;
    width:100%;
    height:100vh;
}
#player {
    position:absolute;
    top:200px;
    left:50px;
    font-size:40px;
}
.pipe {
    position:absolute;
    width:60px;
    background:green;
}
#score {
    position:absolute;
    top:10px;
    left:10px;
    font-size:25px;
    color:white;
}
#startBtn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 30px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="game">
    <div id="player">🐦</div>
    <div id="score">Score: 0</div>
    <button id="startBtn">Start Game</button>
</div>

<script>
let player = document.getElementById("player");
let game = document.getElementById("game");
let scoreText = document.getElementById("score");
let startBtn = document.getElementById("startBtn");

let y = 200;
let velocity = 0;
let gravity = 1.5;
let gameRunning = false;
let score = 0;

function jump(){
    if(gameRunning){
        velocity = -12;
        beep();
    }
}

document.body.onclick = jump;

startBtn.onclick = () => {
    gameRunning = true;
    startBtn.style.display = "none";
};

function beep(){
    let audio = new AudioContext();
    let osc = audio.createOscillator();
    osc.connect(audio.destination);
    osc.start();
    setTimeout(()=>osc.stop(),100);
}

function createPipe(){
    if(!gameRunning) return;

    let pipeTop = document.createElement("div");
    let pipeBottom = document.createElement("div");

    let gap = 160;
    let height = Math.random()*300;

    pipeTop.classList.add("pipe");
    pipeBottom.classList.add("pipe");

    pipeTop.style.height = height + "px";
    pipeTop.style.top = "0";

    pipeBottom.style.height = (window.innerHeight - height - gap) + "px";
    pipeBottom.style.bottom = "0";

    game.appendChild(pipeTop);
    game.appendChild(pipeBottom);

    let x = window.innerWidth;

    let move = setInterval(()=>{
        x -= 4;
        pipeTop.style.left = x + "px";
        pipeBottom.style.left = x + "px";

        if(x < -60){
            pipeTop.remove();
            pipeBottom.remove();
            clearInterval(move);
            score++;
            scoreText.innerText = "Score: " + score;
        }

        if(x < 100 && x > 40){
            if(y < height || y > height + gap){
                gameOver();
            }
        }

    },20);
}

setInterval(createPipe,2000);

function gameLoop(){
    if(!gameRunning) return requestAnimationFrame(gameLoop);

    velocity += gravity;
    y += velocity;

    if(y < 0) y = 0;
    if(y > window.innerHeight-40){
        gameOver();
    }

    player.style.top = y + "px";

    requestAnimationFrame(gameLoop);
}

function gameOver(){
    alert("💀 Game Over! Score: " + score);
    location.reload();
}

gameLoop();
</script>

</body>
</html>
