<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Pro Game</title>

<!-- Rotate support -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:green; overflow:hidden; }

#road {
    width:300px;
    height:100vh;
    background:#333;
    margin:auto;
    position:relative;
    overflow:hidden;
}

/* Road lines */
.line {
    position:absolute;
    width:10px;
    height:80px;
    background:white;
    left:145px;
}

#player {
    position:absolute;
    bottom:20px;
    left:120px;
    font-size:40px;
}

.enemy {
    position:absolute;
    top:0;
    font-size:40px;
}

#score, #level {
    position:absolute;
    left:10px;
    color:white;
}

#score { top:10px; }
#level { top:35px; }

/* Controls */
.controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
}

button {
    width:120px;
    height:70px;
    font-size:25px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="road">
    <div id="player">🚗</div>
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
</div>

<div class="controls">
    <button onclick="moveLeft()">⬅️</button>
    <button onclick="moveRight()">➡️</button>
</div>

<script>
let player = document.getElementById("player");
let road = document.getElementById("road");

let score = 0;
let level = 1;
let speed = 5;

/* Music */
let bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;
bgMusic.play();

/* Road lines */
for(let i=0;i<5;i++){
    let line = document.createElement("div");
    line.className = "line";
    line.style.top = (i*150) + "px";
    road.appendChild(line);
}

function moveLines(){
    document.querySelectorAll(".line").forEach(line=>{
        line.style.top = line.offsetTop + speed + "px";
        if(line.offsetTop > window.innerHeight){
            line.style.top = "-100px";
        }
    });
}

/* Controls */
function moveLeft(){
    let left = player.offsetLeft - 30;
    if(left > 0){
        player.style.left = left + "px";
    }
}

function moveRight(){
    let right = player.offsetLeft + 30;
    if(right < 260){
        player.style.left = right + "px";
    }
}

/* Enemy */
function createEnemy(){
    let enemy = document.createElement("div");
    enemy.innerText = "🚙";
    enemy.className = "enemy";
    enemy.style.left = Math.random()*250 + "px";
    road.appendChild(enemy);

    let move = setInterval(()=>{
        enemy.style.top = enemy.offsetTop + speed + "px";

        if(enemy.offsetTop > window.innerHeight){
            enemy.remove();
            clearInterval(move);
            score++;

            document.getElementById("score").innerText = "Score: " + score;

            /* Level system */
            if(score % 5 == 0){
                level++;
                speed += 1;
                document.getElementById("level").innerText = "Level: " + level;
            }
        }

        if(
            enemy.offsetTop > player.offsetTop - 40 &&
            enemy.offsetLeft < player.offsetLeft + 40 &&
            enemy.offsetLeft + 40 > player.offsetLeft
        ){
            crash();
        }

    },30);
}

function crash(){
    bgMusic.pause();
    alert("💥 Crash! Score: " + score + " Level: " + level);
    location.reload();
}

/* Loop */
function gameLoop(){
    moveLines();
    requestAnimationFrame(gameLoop);
}

setInterval(createEnemy,1500);
gameLoop();
</script>

</body>
</html>
